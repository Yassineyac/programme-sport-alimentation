<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Prise de Masse & Force — Programme</title>
<style>
  :root{
    --bg:#13141c;
    --cream:#f5f1e8;
    --card:#ffffff;
    --ink:#15171f;
    --ink-soft:#6b6f7d;
    --orange:#ff5a3c;
    --orange-soft:#ffe2d8;
    --teal:#13a98a;
    --teal-soft:#d7f3ec;
    --gold:#f2a900;
    --gold-soft:#fdecc6;
    --grey:#5b6275;
    --grey-soft:#e7e8ee;
    --radius:16px;
    --shadow:0 2px 10px rgba(20,20,30,0.07);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
  }
  .app{
    max-width:560px;
    margin:0 auto;
    min-height:100vh;
    background:var(--cream);
    position:relative;
    padding-bottom:40px;
  }

  /* HEADER */
  header.top{
    background:var(--bg);
    color:#fff;
    padding:18px 18px 14px;
    position:sticky;
    top:0;
    z-index:30;
  }
  header.top .eyebrow{
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--orange);
    font-weight:700;
    margin-bottom:4px;
  }
  header.top h1{
    margin:0;
    font-size:21px;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  header.top h1 span{color:var(--orange);}
  .stat-row{
    display:flex;
    gap:8px;
    margin-top:12px;
    overflow-x:auto;
  }
  .stat-chip{
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    padding:6px 10px;
    font-size:11px;
    white-space:nowrap;
    flex:none;
  }
  .stat-chip b{font-size:13px;display:block;}

  /* PILL NAV */
  nav.pills{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:10px 14px;
    background:var(--bg);
    position:sticky;
    top:78px;
    z-index:29;
    border-bottom:1px solid rgba(255,255,255,0.08);
    scrollbar-width:none;
  }
  nav.pills::-webkit-scrollbar{display:none;}
  .pill{
    flex:none;
    padding:8px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    color:#cfd2dc;
    background:rgba(255,255,255,0.06);
    cursor:pointer;
    border:1px solid transparent;
    user-select:none;
  }
  .pill.active{
    background:#fff;
    color:var(--bg);
  }
  .pill .dot{
    display:inline-block;
    width:7px;height:7px;border-radius:50%;
    margin-right:6px;
    vertical-align:middle;
  }

  main{padding:16px 14px 10px;}
  section.tab{display:none;}
  section.tab.active{display:block;}

  /* Generic card */
  .card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{
    margin:0 0 4px;
    font-size:17px;
    font-weight:800;
  }
  .card .sub{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:10px;
    line-height:1.4;
  }
  .day-band{
    border-radius:var(--radius) var(--radius) 0 0;
    margin:-16px -16px 12px;
    padding:16px;
    color:#fff;
  }
  .day-band .label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.85;font-weight:700;}
  .day-band h2{color:#fff;margin-top:2px;}
  .band-orange{background:var(--orange);}
  .band-teal{background:var(--teal);}
  .band-gold{background:var(--gold);color:#1a1a1a;}
  .band-gold .label, .band-gold h2{color:#1a1a1a;}
  .band-grey{background:var(--grey);}

  .progress-wrap{
    margin-top:6px;
  }
  .progress-bar-bg{
    height:7px;border-radius:99px;background:rgba(255,255,255,0.3);overflow:hidden;
  }
  .progress-bar-fill{
    height:100%;background:#fff;border-radius:99px;width:0%;transition:width .25s;
  }
  .progress-label{font-size:11px;opacity:.9;margin-top:4px;}

  .note{
    background:var(--grey-soft);
    border-radius:10px;
    padding:10px 12px;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:12px;
    line-height:1.45;
  }
  .note b{color:var(--ink);}

  /* Exercise row */
  .ex-row{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:11px 0;
    border-bottom:1px solid #efece3;
  }
  .ex-row:last-child{border-bottom:none;}
  .ex-row.done .ex-name{
    text-decoration:line-through;
    color:#b9bcc6;
  }
  input.checkbox{
    flex:none;
    width:28px;height:28px;
    min-width:28px;
    border-radius:8px;
    border:2px solid #d8d4c6;
    margin:1px 0 0 0;
    -webkit-appearance:none;
    appearance:none;
    background:#fff;
    cursor:pointer;
    position:relative;
  }
  input.checkbox:checked{
    background:var(--ink);
    border-color:var(--ink);
  }
  input.checkbox:checked::after{
    content:"✓";
    color:#fff;
    font-size:16px;
    font-weight:700;
    position:absolute;
    top:48%;left:50%;
    transform:translate(-50%,-50%);
  }
  label.ex-row, label.meal-top{cursor:pointer;}
  .ex-body{flex:1;min-width:0;}
  .ex-icon-wrap{
    flex:none;
    width:42px;height:42px;
    border-radius:50%;
    display:flex;
    align-items:center;justify-content:center;
    margin-top:0;
  }
  .ex-icon{width:28px;height:28px;}
  .ex-icon *{stroke:var(--ink);stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .ex-icon .fill{fill:var(--ink);stroke:none;}
  .ex-name{font-size:14.5px;font-weight:700;}
  .ex-tag{font-size:11px;color:var(--orange);font-weight:700;display:block;margin-top:1px;}
  .ex-meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .ex-desc{font-size:12.5px;color:#4a4d57;margin-top:5px;line-height:1.45;background:#f6f3e9;border-radius:8px;padding:7px 9px;}
  .ex-log{
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .ex-log input{
    border:1px solid #e2dfd3;
    border-radius:8px;
    padding:6px 8px;
    font-size:12.5px;
    width:108px;
    background:#fbf9f4;
  }
  .ex-log label{font-size:11px;color:var(--ink-soft);}

  /* Meal card */
  .meal{
    border-bottom:1px solid #efece3;
    padding:12px 0;
  }
  .meal:last-child{border-bottom:none;}
  .meal-top{display:flex;align-items:flex-start;gap:10px;}
  .meal-info{flex:1;}
  .meal-title-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .meal-name{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
  .meal-kcal{font-size:12px;color:var(--ink-soft);font-weight:700;white-space:nowrap;}
  .meal.done .meal-name{color:#b9bcc6;}
  .meal ul{margin:6px 0 0 0;padding-left:18px;font-size:13px;color:#3a3d47;line-height:1.5;}
  .meal.done ul{color:#c2c4cc;}
  .day-total{
    margin-top:6px;
    background:var(--bg);
    color:#fff;
    border-radius:10px;
    padding:9px 12px;
    font-size:12.5px;
    display:flex;justify-content:space-between;
  }
  .day-total b{color:var(--gold);}

  .reset-btn{
    display:block;
    width:100%;
    text-align:center;
    background:none;
    border:1px solid #e2dfd3;
    color:var(--ink-soft);
    border-radius:10px;
    padding:9px;
    font-size:12.5px;
    font-weight:700;
    margin-top:4px;
    cursor:pointer;
  }
  .reset-btn:active{background:#f1eee4;}

  /* Accueil */
  .objectifs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .obj-pill{
    font-size:12px;font-weight:700;color:#fff;padding:6px 12px;border-radius:999px;
  }
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px;}
  .week-cell{
    border-radius:10px;
    padding:8px 4px;
    text-align:center;
    color:#fff;
    font-size:10.5px;
    font-weight:700;
  }
  .week-cell .d{display:block;font-size:11.5px;margin-bottom:2px;}
  ol.rules{margin:0;padding-left:20px;font-size:13px;line-height:1.6;}
  ol.rules li{margin-bottom:8px;}
  ol.rules b{color:var(--orange);}

  .global-progress{
    background:var(--bg);
    border-radius:var(--radius);
    padding:16px;
    color:#fff;
    margin-bottom:14px;
  }
  .global-progress h2{color:#fff;margin:0 0 10px;font-size:16px;}
  .ring-row{display:flex;gap:10px;}
  .ring{flex:1;text-align:center;}
  .ring .pct{font-size:22px;font-weight:800;color:var(--gold);}
  .ring .lbl{font-size:11px;color:#aeb1bd;margin-top:2px;}

  .changelog{font-size:12.5px;line-height:1.6;color:var(--ink-soft);}
  .changelog li{margin-bottom:6px;}
  .changelog b{color:var(--ink);}

  /* Suivi */
  .field-row{display:flex;gap:8px;margin-bottom:8px;}
  .field-row input{
    flex:1;
    border:1px solid #e2dfd3;
    border-radius:10px;
    padding:9px 10px;
    font-size:13.5px;
    background:#fbf9f4;
  }
  .field-row select{
    border:1px solid #e2dfd3;
    border-radius:10px;
    padding:9px 10px;
    font-size:13px;
    background:#fbf9f4;
  }
  .add-btn{
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:9px 14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }
  table.log{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px;}
  table.log th{text-align:left;color:var(--ink-soft);font-weight:700;padding:4px 6px;border-bottom:1px solid #e9e6da;}
  table.log td{padding:6px 6px;border-bottom:1px solid #f1eee4;}
  table.log td.del{color:var(--orange);text-align:right;cursor:pointer;font-weight:700;}

  footer.app-footer{
    text-align:center;
    font-size:11px;
    color:#9a8f7a99;
    padding:18px 0 4px;
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="eyebrow">Programme personnalisé</div>
    <h1>Prise de <span>Masse</span> & Force</h1>
    <div class="stat-row" id="statRow"></div>
  </header>

  <nav class="pills" id="pillNav"></nav>

  <main id="main"></main>

  <footer class="app-footer">Coche, note tes charges, dépasse-toi. 💪 — Conçu pour 5 séances/semaine.</footer>
</div>

<script>

  lunge:`<rect x="40" y="40" width="16" height="6" rx="2"/><circle cx="22" cy="12" r="5" class="fill"/><line x1="22" y1="17" x2="22" y2="38"/><line x1="22" y1="38" x2="16" y2="58"/><line x1="22" y1="38" x2="30" y2="48"/><line x1="30" y1="48" x2="44" y2="40"/><line x1="22" y1="24" x2="14" y2="40"/><line x1="22" y1="24" x2="30" y2="40"/>`,
  leg_press:`<rect x="8" y="44" width="40" height="6" rx="2"/><circle cx="16" cy="38" r="5" class="fill"/><line x1="21" y1="38" x2="34" y2="44"/><line x1="34" y1="44" x2="34" y2="30"/><line x1="34" y1="30" x2="48" y2="30"/><line x1="48" y1="14" x2="48" y2="46"/>`,

function buildPills(){
  const tabs = [{key:'accueil', label:'Accueil'}]
    .concat(DAY_ORDER.map(d=>({key:d, label: DAY_COLORS[d].label.slice(0,3)})))
    .concat([{key:'suivi', label:'Suivi'}]);
  pillNav.innerHTML = tabs.map(t=>{
    const dotColor = DAY_COLORS[t.key] ? DAY_COLORS[t.key].dot : null;
    return `<div class="pill ${activeTab===t.key?'active':''}" data-tab="${t.key}">
      ${dotColor?`<span class="dot" style="background:${dotColor}"></span>`:''}${t.label}
    </div>`;
  }).join('');
  pillNav.querySelectorAll('.pill').forEach(p=>{
    p.addEventListener('click', ()=>{ activeTab = p.dataset.tab; render(); window.scrollTo({top:0,behavior:'smooth'}); });
  });
}

function exId(day,idx){ return `ex_${day}_${idx}`; }
function mealId(day,idx){ return `meal_${day}_${idx}`; }

function dayCompletion(day){
  const tItems = TRAINING[day].items, mItems = MEALS[day].meals;
  let total = tItems.length + mItems.length, done = 0;
  tItems.forEach((_,i)=>{ if(state.checks[exId(day,i)]) done++; });
  mItems.forEach((_,i)=>{ if(state.checks[mealId(day,i)]) done++; });
  return total ? Math.round(done/total*100) : 0;
}

function renderDayTab(day){
  const meta = DAY_COLORS[day];
  const tr = TRAINING[day];
  const me = MEALS[day];
  const pct = dayCompletion(day);

  let exHtml = tr.items.map((it,i)=>{
    const id = exId(day,i);
    const checked = !!state.checks[id];
    const logVal = state.logs[id] || '';
    return `
    <label class="ex-row ${checked?'done':''}">
      <input type="checkbox" class="checkbox" data-check="${id}" ${checked?'checked':''}>
      <div class="ex-icon-wrap" style="background:${iconBg(day)}">${iconSvg(it.icon)}</div>
      <div class="ex-body">
        <div class="ex-name">${it.n}</div>
        ${it.tag?`<span class="ex-tag">${it.tag}</span>`:''}
        <div class="ex-meta">${it.s} séries × ${it.r} &nbsp;·&nbsp; repos ${it.rest}</div>
        ${it.desc?`<div class="ex-desc">${it.desc}</div>`:''}
        <div class="ex-log">
          <span>Charge :</span>
          <input type="text" placeholder="ex: 60kg" value="${logVal.replace(/"/g,'&quot;')}" data-log="${id}">
        </div>
      </div>
    </label>`;
  }).join('');

  let mealHtml = me.meals.map((m,i)=>{
    const id = mealId(day,i);
    const checked = !!state.checks[id];
    return `
    <div class="meal ${checked?'done':''}">
      <label class="meal-top">
        <input type="checkbox" class="checkbox" data-check="${id}" ${checked?'checked':''}>
        <div class="meal-info">
          <div class="meal-title-row">
            <span class="meal-name">${m.n}</span>
            <span class="meal-kcal">${m.k}</span>
          </div>
          <ul>${m.items.map(x=>`<li>${x}</li>`).join('')}</ul>
        </div>
      </label>
    </div>`;
  }).join('');

  return `
    <div class="card" style="padding-top:0;">
      <div class="day-band ${meta.band}">
        <div class="label">${meta.label} · Jour ${DAY_ORDER.indexOf(day)+1}</div>
        <h2>🏋️ ${tr.title}</h2>
        <div class="progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <div class="progress-label">${pct}% complété aujourd'hui</div>
        </div>
      </div>
      <div class="sub">${tr.sub}</div>
      ${tr.warmup?`<div class="note"><b>Échauffement :</b> ${tr.warmup}</div>`:''}
      ${tr.note?`<div class="note">${tr.note}</div>`:''}
      ${exHtml}
    </div>

    <div class="card">
      <h2>🍽️ Alimentation</h2>
      <div class="sub">Plan du jour — coche chaque repas pris.</div>
      ${mealHtml}
      <div class="day-total">Total estimé <b>${me.tot}</b></div>
    </div>

    <button class="reset-btn" data-reset="${day}">↺ Réinitialiser les cases de ce jour</button>
  `;
}

function renderAccueil(){
  const weekColors = DAY_ORDER.map(d=>{
    const m = DAY_COLORS[d];
    const bg = m.dot;
    return `<div class="week-cell" style="background:${bg}"><span class="d">${m.label.slice(0,3)}</span>${dayCompletion(d)}%</div>`;
  }).join('');

  // global stats
  let totalAll=0, doneAll=0;
  DAY_ORDER.forEach(d=>{
    const tItems = TRAINING[d].items, mItems = MEALS[d].meals;
    totalAll += tItems.length + mItems.length;
    tItems.forEach((_,i)=>{ if(state.checks[exId(d,i)]) doneAll++; });
    mItems.forEach((_,i)=>{ if(state.checks[mealId(d,i)]) doneAll++; });
  });
  const globalPct = totalAll? Math.round(doneAll/totalAll*100):0;

  return `
    <div class="global-progress">
      <h2>Ta progression cette semaine</h2>
      <div class="ring-row">
        <div class="ring"><div class="pct">${globalPct}%</div><div class="lbl">cases cochées</div></div>
        <div class="ring"><div class="pct">5/sem</div><div class="lbl">séances</div></div>
        <div class="ring"><div class="pct">~2 450</div><div class="lbl">kcal cible/j</div></div>
      </div>
      <div class="week-grid">${weekColors}</div>
    </div>

    <div class="card">
      <h2>Objectifs prioritaires</h2>
      <div class="objectifs">
        <span class="obj-pill" style="background:var(--orange)">Torse</span>
        <span class="obj-pill" style="background:var(--teal)">Épaules</span>
        <span class="obj-pill" style="background:var(--gold);color:#1a1a1a">Bras</span>
        <span class="obj-pill" style="background:var(--orange)">Fessiers</span>
        <span class="obj-pill" style="background:var(--teal)">Perte ventre</span>
      </div>
    </div>

    <div class="card">
      <h2>Règles d'or</h2>
      <ol class="rules">
        <li><b>Surcharge progressive.</b> Note CHAQUE séance (poids × séries × reps) dans le champ « Charge » de chaque exercice — sans suivi écrit, pas de vraie progression.</li>
        <li><b>Double progression.</b> Reste dans la fourchette de reps. Dès le HAUT de la fourchette sur TOUTES les séries, 2 séances de suite → augmente le poids (+2,5-5kg haut du corps / +5-10kg bas du corps) et redescends en bas de fourchette.</li>
        <li><b>Semaine 1 en douceur.</b> 60-70% des charges visées sur squat, soulevé de terre, développé militaire. Monte normalement dès la semaine 2.</li>
        <li><b>Deload toutes les 6 semaines.</b> Mêmes charges, volume coupé de moitié (2 séries au lieu de 4).</li>
        <li><b>Échauffement systématique</b> avant chaque séance — voir la note en haut de chaque jour.</li>
        <li><b>Pas de perte de graisse localisée.</b> C'est l'alimentation + l'activité globale qui réduisent la masse grasse partout, progressivement.</li>
        <li><b>Sommeil.</b> 7-8h/nuit — c'est pendant le sommeil que le muscle se répare et grossit.</li>
      </ol>
    </div>

    <div class="card">
      <h2>🍽️ Nouveau cap nutritionnel</h2>
      <div class="sub" style="font-size:13px;">
        Objectif mis à jour : <b>perdre du gras (surtout au niveau de la taille) tout en continuant à prendre du muscle.</b> On passe d'un apport de maintenance (~2 900 kcal) à un <b>déficit modéré (~2 450 kcal/j, -15%)</b>. Les protéines restent hautes (~195-200g/j) pour protéger le muscle ; ce sont les glucides et un peu de lipides qui baissent.
      </div>
      <div class="note" style="margin-top:10px;margin-bottom:0;">
        <b>Comment ajuster :</b> pèse-toi 1×/semaine à jeun. Si en 2-3 semaines ton poids ne bouge pas du tout ou que le tour de taille ne diminue pas → réduis encore de 100-150 kcal/j. Si tu perds plus de 0,5-0,7 kg/semaine → augmente de 100-150 kcal/j pour ne pas perdre de muscle. Le tour de taille qui diminue progressivement est ton meilleur indicateur, pas juste le poids.
      </div>
    </div>

    <div class="card">
      <h2>Ce que j'ai ajusté pour toi</h2>
      <ul class="changelog">
        <li><b>Plan alimentaire revu en déficit modéré</b> (~2 450 kcal au lieu de ~2 900) pour vraiment faire baisser la masse grasse et affiner la taille, sans toucher aux quantités de protéines.</li>
        <li><b>Descriptions courtes ajoutées</b> sur chaque exercice pour clarifier l'exécution technique en complément du pictogramme.</li>
        <li><b>Volume épaules réduit</b> (Push B) : -1 série sur élévations latérales lourdes, Arnold press et élévations frontales. Le cumul Lundi + Jeudi était trop élevé pour une reprise post-convalescence.</li>
        <li><b>Gainage ajouté</b> (planche, dead bug) les jours Push — sécurité lombaire, surtout après convalescence.</li>
        <li><b>Leg curl ajouté</b> le jour Legs pour équilibrer le travail des ischios (absent avant).</li>
        <li><b>Repos complet recommandé</b> le samedi des semaines 1 à 3, à la place de la marche — pour bien relancer la récupération. Reprends la marche soutenue dès la semaine 4.</li>
      </ul>
    </div>
  `;
}

function renderSuivi(){
  const rows = suivi.map((s,i)=>`
    <tr>
      <td>${s.date}</td>
      <td>${s.type}</td>
      <td>${s.value}</td>
      <td class="del" data-del="${i}">✕</td>
    </tr>
  `).join('');

  return `
    <div class="card">
      <h2>Ton suivi de progression</h2>
      <div class="sub">
        Poids : 1×/semaine à jeun, le matin · Tour de taille / hanches / poitrine / bras : toutes les 2 semaines · Photos : toutes les 2 semaines, même lieu / lumière.
      </div>
      <div class="field-row">
        <input type="date" id="suiviDate">
        <select id="suiviType">
          <option value="Poids (kg)">Poids (kg)</option>
          <option value="Tour de taille (cm)">Tour de taille (cm)</option>
          <option value="Tour de hanches (cm)">Tour de hanches (cm)</option>
          <option value="Tour de poitrine (cm)">Tour de poitrine (cm)</option>
          <option value="Tour de bras (cm)">Tour de bras (cm)</option>
        </select>
      </div>
      <div class="field-row">
        <input type="text" id="suiviValue" placeholder="Valeur (ex: 91.5)">
        <button class="add-btn" id="suiviAdd">Ajouter</button>
      </div>
      <table class="log">
        <tr><th>Date</th><th>Mesure</th><th>Valeur</th><th></th></tr>
        ${rows || '<tr><td colspan="4" style="color:#9a9a9a">Aucune entrée encore.</td></tr>'}
      </table>
    </div>

    <div class="card">
      <h2>À quoi t'attendre</h2>
      <div class="sub" style="font-size:13px;">
        Avec ce programme et une alimentation à maintenance haute en protéines : compte <b>3-4 semaines</b> pour ressentir une nette amélioration de la force, et <b>6-10 semaines</b> pour voir des changements visibles de volume musculaire (épaules, bras, fessiers). La réduction de la zone abdominale sera plus progressive — c'est normal et attendu avec cette approche orientée prise de masse.
      </div>
    </div>
  `;
}

function render(){
  buildPills();
  if(activeTab==='accueil'){ main.innerHTML = renderAccueil(); }
  else if(activeTab==='suivi'){ main.innerHTML = renderSuivi(); attachSuiviHandlers(); }
  else { main.innerHTML = renderDayTab(activeTab); }
  attachCommonHandlers();
}

function attachCommonHandlers(){
  main.querySelectorAll('[data-check]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const id = el.dataset.check;
      state.checks[id] = el.checked;
      saveState();
      render();
    });
  });
  main.querySelectorAll('[data-log]').forEach(el=>{
    el.addEventListener('click', (e)=>{ e.stopPropagation(); });
    el.addEventListener('input', ()=>{
      state.logs[el.dataset.log] = el.value;
      saveState();
    });
  });
  main.querySelectorAll('[data-reset]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const day = el.dataset.reset;
      Object.keys(state.checks).forEach(k=>{
        if(k.includes(`_${day}_`)) delete state.checks[k];
      });
      saveState();
      render();
    });
  });
}

function attachSuiviHandlers(){
  const btn = document.getElementById('suiviAdd');
  if(!btn) return;
  btn.addEventListener('click', ()=>{
    const date = document.getElementById('suiviDate').value || new Date().toISOString().slice(0,10);
    const type = document.getElementById('suiviType').value;
    const value = document.getElementById('suiviValue').value;
    if(!value) return;
    suivi.unshift({date,type,value});
    saveSuivi();
    render();
  });
  main.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click', ()=>{
      suivi.splice(parseInt(el.dataset.del),1);
      saveSuivi();
      render();
    });
  });
}

render();
</script>
</body>
</html>
